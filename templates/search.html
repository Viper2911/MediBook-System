{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow border-0 mb-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="text-primary fw-bold">AI Symptom Checker</h2>
                    <p class="text-muted">Describe how you are feeling, and our ML model will analyze your symptoms to find the best match.</p>
                </div>
                
                <form method="POST">
                    <div class="mb-4">
                        <textarea name="symptoms" class="form-control form-control-lg bg-light" rows="4" placeholder="e.g., I have been experiencing severe headaches and dizziness for the past two days..." required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm">
                        Analyze Symptoms
                    </button>
                </form>
            </div>
        </div>
        
        <div class="card border-0 bg-transparent text-center mt-3">
            <div class="card-body text-muted">
                <small>🔒 Your data is processed securely and is not stored permanently.</small>
            </div>
        </div>
    </div>
</div>
{% endblock %}
