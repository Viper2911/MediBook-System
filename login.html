{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 mt-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h3 class="text-primary fw-bold">Welcome Back</h3>
                    <p class="text-muted">Please sign in to your account</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Username</label>
                        <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter username" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="Enter password" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Login</button>
                </form>
                <p class="text-center mt-4 text-muted">Don't have an account? <a href="{{ url_for('register') }}" class="text-decoration-none">Sign up</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
