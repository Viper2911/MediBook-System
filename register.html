{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 mt-4">
            <div class="card-body p-5">
                <h3 class="text-center text-primary fw-bold mb-4">Create an Account</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Username</label>
                        <input type="text" name="username" class="form-control form-control-lg" placeholder="Enter username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Password</label>
                        <input type="password" name="password" class="form-control form-control-lg" placeholder="Create a password" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold">I am a...</label>
                        <select name="role" class="form-select form-select-lg">
                            <option value="Patient">Patient</option>
                            <option value="Doctor">Doctor</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold">Register</button>
                </form>
                <p class="text-center mt-4 text-muted">Already have an account? <a href="{{ url_for('login') }}" class="text-decoration-none">Login here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
